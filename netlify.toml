[build]
  # Sincroniza comercios desde Supabase y luego compila. Se usa ";" (no "&&")
  # a propósito: si el sync fallara (Supabase caído, env sin definir), el deploy
  # continúa con el comercios.json ya commiteado en vez de romper la web.
  command = "npm run sync:comercios; npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Cabeceras de seguridad y rendimiento
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Las rutas del panel admin no deben cachearse: contienen datos privados y
# se renderizan en SSR (Netlify Functions vía adaptador @astrojs/netlify).
[[headers]]
  for = "/admin/*"
  [headers.values]
    Cache-Control = "no-store, max-age=0"
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "no-store, max-age=0"
    X-Robots-Tag = "noindex, nofollow"
